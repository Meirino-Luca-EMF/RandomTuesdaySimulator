<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Tuesday Simulator — The Alley District</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/Style.css" />
    <link rel="stylesheet" href="../styles/DialogSystem.css" />
    <style>
      body {
        overflow: hidden;
        background: #050508;
      }
      #fade-in {
        position: fixed;
        inset: 0;
        background: #050508;
        z-index: 9999;
        pointer-events: none;
        transition: opacity 1s ease;
      }
      #street-wrapper {
        position: fixed;
        inset: 0;
        z-index: 300;
        background: #050508;
        overflow: hidden;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #street-canvas {
        position: absolute;
      }
      #ui-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="fade-in"></div>
    <div class="bg-layer bg-grid" style="opacity: 0.3"></div>
    <div class="bg-noise"></div>
    <div class="scanlines"></div>
    <div id="street-wrapper">
      <canvas id="street-canvas"></canvas>
      <canvas id="ui-canvas"></canvas>
    </div>

    <script src="../scripts/DialogSystem.js"></script>
    <script>
      "use strict";

      /* ══════════════════════════════════════════════════════════
   STREET3.JS — The Alley District
   A darker, seedier block. Neon-lit, rain-slicked.
   Map: 80 cols × 18 rows
   Enters from west (Street2 east exit) → sp.tx starts at 1.5
   Exits west back to Street2, or east to future areas.
   ══════════════════════════════════════════════════════════ */

      const TILE = 16,
        SCALE = 3,
        S = TILE * SCALE;
      const COLS = 80,
        ROWS = 18;

      /* ── State ── */
      function loadState() {
        try {
          return JSON.parse(localStorage.getItem("rts_state") || "{}");
        } catch (e) {
          return {};
        }
      }
      function saveState(patch) {
        try {
          const s = loadState();
          Object.assign(s, patch);
          localStorage.setItem("rts_state", JSON.stringify(s));
          if (patch.money !== undefined)
            localStorage.setItem("rts_money", String(patch.money));
        } catch (e) {}
      }
      const _S = loadState();

      /* ── Palette — neon-slicked night district ── */
      const C = {
        skyTop: "#050508",
        skyMid: "#080a14",
        skyBot: "#0d1020",
        star: "rgba(200,220,255,0.6)",
        neonR: "rgba(255,40,80,0.7)",
        neonB: "rgba(40,80,255,0.65)",
        neonG: "rgba(40,220,120,0.6)",
        neonY: "rgba(255,220,0,0.7)",
        pavA: "#2a2a2e",
        pavB: "#252528",
        pavC: "#303035",
        pavLine: "rgba(255,255,255,0.04)",
        pavWet: "rgba(20,30,60,0.35)",
        rdA: "#181818",
        rdB: "#141414",
        rdMark: "#806010",
        puddle: "rgba(30,50,80,0.5)",
        bldA: "#1e1428",
        bldB: "#14101e",
        bldC: "#1a1a28",
        bldD: "#180e18",
        winOff: "#0e0e12",
        winOn: "#c8a030",
        winNeonR: "rgba(255,40,80,0.9)",
        winNeonB: "rgba(60,100,255,0.9)",
        bldDoor: "#0e0808",
        bldDoorFr: "#1e1210",
        lampPost: "#282828",
        lampNeon: "rgba(255,40,80,0.8)",
        treeTk: "#1a1208",
        treeLvA: "#0e1e08",
        treeLvB: "#122610",
        treeLvC: "#162e12",
        coinG: "#f0c020",
        coinGLit: "#ffd840",
        hintBg: "#ffe600",
        hintTx: "#1a1200",
        rainA: "rgba(160,180,220,0.18)",
        rainB: "rgba(140,160,200,0.12)",
      };

      /* ── Map tiles ── */
      const _P = 0,
        _R = 1,
        _M = 2,
        _B = 3,
        _D = 4,
        _T = 5,
        _L = 6,
        _A = 7,
        _W = 8; // _W = wet/puddle pavement

      function buildMap() {
        const rows = [];
        for (let r = 0; r < ROWS; r++) {
          const row = [];
          for (let c = 0; c < COLS; c++) row.push(getTile(c, r));
          rows.push(row);
        }
        return rows;
      }
      function getTile(c, r) {
        if (r === 6 || r === 7 || r === 9 || r === 10) return _R;
        if (r === 8) return c % 4 < 2 ? _M : _R;
        if (r === 4 || r === 5) {
          if (
            c === 4 ||
            c === 18 ||
            c === 32 ||
            c === 50 ||
            c === 65 ||
            c === 76
          )
            return _L;
          if (c === 9 || c === 25 || c === 42 || c === 58 || c === 72)
            return _T;
          // puddle patches on north pavement
          if ((c * 7 + r * 13) % 11 === 0) return _W;
          return _P;
        }
        if (r === 11 || r === 12) {
          if (
            c === 2 ||
            c === 16 ||
            c === 30 ||
            c === 48 ||
            c === 62 ||
            c === 74
          )
            return _L;
          if (c === 7 || c === 22 || c === 38 || c === 55 || c === 70)
            return _T;
          if ((c * 11 + r * 7) % 13 === 0) return _W;
          return _P;
        }
        if (r >= 0 && r <= 3) {
          if (r === 3) {
            const doors = [10, 11, 24, 25, 38, 39, 52, 53, 66, 67];
            if (doors.includes(c)) return _D;
          }
          return _B;
        }
        if (r >= 13 && r <= 17) {
          if (r === 16) {
            const doors = [5, 6, 20, 21, 35, 36, 48, 49, 62, 63, 76, 77];
            if (doors.includes(c)) return _D;
          }
          return _B;
        }
        return _P;
      }
      const SMAP = buildMap();
      const SOLID_STREET = new Set([_B, _T]);

      /* ── Rain system ── */
      const RAIN = [];
      for (let i = 0; i < 220; i++) {
        RAIN.push({
          x: Math.random() * COLS * S,
          y: Math.random() * ROWS * S,
          len: SCALE * (4 + Math.random() * 8),
          speed: SCALE * (18 + Math.random() * 14),
          alpha: 0.1 + Math.random() * 0.12,
        });
      }

      /* ── Neon signs (decorative overlays, not objects) ── */
      const NEON_SIGNS = [
        {
          x: 12 * S,
          y: 2.2 * S,
          text: "BAR",
          color: "#ff2850",
          glow: "rgba(255,40,80,0.35)",
          w: 2.8 * S,
        },
        {
          x: 26 * S,
          y: 1.8 * S,
          text: "LOANS",
          color: "#40c0ff",
          glow: "rgba(40,180,255,0.3)",
          w: 4 * S,
        },
        {
          x: 40 * S,
          y: 2.4 * S,
          text: "★ PAWN ★",
          color: "#ffe600",
          glow: "rgba(255,220,0,0.3)",
          w: 4.5 * S,
        },
        {
          x: 54 * S,
          y: 1.9 * S,
          text: "24H",
          color: "#40ff80",
          glow: "rgba(40,255,120,0.3)",
          w: 2.5 * S,
        },
        {
          x: 67 * S,
          y: 2.2 * S,
          text: "CASINO",
          color: "#ff40c0",
          glow: "rgba(255,40,200,0.3)",
          w: 4.5 * S,
        },
      ];

      /* ── Stars ── */
      const STARS = [];
      for (let i = 0; i < 60; i++)
        STARS.push({
          x: (Math.sin(i * 997.3) * 0.5 + 0.5) * COLS * S,
          y: (Math.cos(i * 1337.7) * 0.5 + 0.5) * 3.5 * S,
          r: Math.random() * 1.2 + 0.4,
          twinkle: Math.random() * Math.PI * 2,
        });

      /* ── NPC/Object state flags ── */
      let pawnTalked = _S.pawnTalked === true;
      let pawnSold = _S.pawnSold === true; // player sold something at pawn
      let barTalked = _S.barTalked === true;
      let barDrunk = _S.barDrunk === true;
      let loanTalked = _S.loanTalked === true;
      let loanTaken = _S.loanTaken === true;
      let casinoTalked = _S.casinoTalked === true;
      let graffiti3Talked = _S.graffiti3Talked === true;
      let shadowTalked = _S.shadowTalked === true;
      let s3CoinCollected = _S.s3CoinCollected === true;

      /* ── Player ── */
      const sp = {
        tx: 1.5,
        ty: 4.5,
        facing: "right",
        frame: 0,
        frameTimer: 0,
        money: _S.money ?? 0,
        dignity: _S.dignity ?? 0,
        inventory: _S.inventory ?? [],
        weapon: _S.weapon ?? null,
      };

      /* ── Objects ── */
      const SOBJECTS = [];

      /* ─── COIN (south pavement, col 4) ─── */
      if (!s3CoinCollected) {
        SOBJECTS.push({
          id: "coin3",
          tx: 4,
          ty: 11,
          w: 1,
          h: 1,
          hx: 0,
          hy: 0,
          hw: 0,
          hh: 0,
          get _skip() {
            return s3CoinCollected;
          },
          label: "Something shiny",
          interact() {
            DialogSystem.show({
              speaker: "NARRATOR",
              speakerPortrait: "unknown",
              playerPortrait: "happy",
              lines: [
                {
                  text: "A crumpled €2 coin on the wet pavement.",
                  speaker: "right",
                },
                {
                  text: '"The rain didn\'t wash away its value."',
                  speaker: "left",
                  expr: "happy",
                },
                {
                  text: "You pocket it. No one saw. Probably.",
                  speaker: "right",
                },
              ],
              onClose() {
                s3CoinCollected = true;
                sp.money += 2;
                saveState({ money: sp.money, s3CoinCollected: true });
              },
            });
          },
          draw(ctx) {
            if (s3CoinCollected) return;
            const b = Math.sin(Date.now() / 300) * SCALE * 0.6;
            ctx.save();
            ctx.translate(0, b);
            ctx.globalAlpha = 0.22 + 0.16 * Math.sin(Date.now() / 380);
            ctx.fillStyle = "#ffe600";
            ctx.beginPath();
            ctx.arc(S / 2, S / 2, SCALE * 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#a07808";
            ctx.beginPath();
            ctx.arc(
              S / 2 + SCALE * 0.4,
              S / 2 + SCALE * 0.4,
              SCALE * 5,
              0,
              Math.PI * 2
            );
            ctx.fill();
            ctx.fillStyle = C.coinG;
            ctx.beginPath();
            ctx.arc(S / 2, S / 2, SCALE * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = C.coinGLit;
            ctx.beginPath();
            ctx.arc(S / 2, S / 2, SCALE * 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#a07808";
            ctx.font = `bold ${SCALE * 4}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("2", S / 2, S / 2);
            ctx.restore();
          },
        });
      }

      /* ─── PAWN SHOP OWNER ─── */
      SOBJECTS.push({
        id: "pawn",
        tx: 10,
        ty: 11,
        w: 1,
        h: 2,
        hx: 10,
        hy: 11,
        hw: 1,
        hh: 2,
        label: "PAWN — Tony",
        interact() {
          if (pawnTalked && !pawnSold) {
            // Recurring — remind offer
            DialogSystem.show({
              speaker: "TONY",
              speakerPortrait: "pawn",
              playerPortrait: "normal",
              lines: [
                {
                  text: '"Still here. Still open. Still buying."',
                  expr: "normal",
                },
                {
                  text: '"You got anything worth selling yet, kid?"',
                  expr: "smirk",
                },
              ],
              choices: [
                sp.inventory.length > 0
                  ? { label: `Sell an item (+€8)`, value: "sell" }
                  : { label: "Nothing to sell right now.", value: "nothing" },
                { label: "Just browsing.", value: "browse" },
              ],
              onChoice(val) {
                if (val === "sell" && sp.inventory.length > 0) {
                  const sold = sp.inventory.shift();
                  sp.money += 8;
                  pawnSold = true;
                  saveState({
                    money: sp.money,
                    inventory: sp.inventory,
                    pawnSold: true,
                  });
                  setTimeout(() => {
                    DialogSystem.show({
                      speaker: "TONY",
                      speakerPortrait: "pawn",
                      playerPortrait: "happy",
                      lines: [
                        {
                          text: `"${sold.name}? Sure. I'll give you €8. Final offer."`,
                          expr: "smirk",
                        },
                        {
                          text: '"Good doing business with you."',
                          expr: "normal",
                        },
                        {
                          text: `★ Sold ${sold.name} for €8. Balance: €${sp.money}.`,
                          speaker: "left",
                          expr: "happy",
                        },
                      ],
                    });
                  }, 80);
                } else if (val === "nothing") {
                  setTimeout(() => {
                    DialogSystem.show({
                      speaker: "TONY",
                      speakerPortrait: "pawn",
                      playerPortrait: "normal",
                      lines: [
                        {
                          text: '"Come back when you do. Door\'s always open. Mostly."',
                          expr: "normal",
                        },
                      ],
                    });
                  }, 80);
                } else {
                  setTimeout(() => {
                    DialogSystem.show({
                      speaker: "TONY",
                      speakerPortrait: "pawn",
                      playerPortrait: "normal",
                      lines: [
                        { text: '"Browsing." *sighs*', expr: "normal" },
                        {
                          text: "\"Everyone's browsing. Nobody's buying.\"",
                          expr: "smirk",
                        },
                      ],
                    });
                  }, 80);
                }
              },
            });
            return;
          }
          if (pawnSold) {
            DialogSystem.show({
              speaker: "TONY",
              speakerPortrait: "pawn",
              playerPortrait: "normal",
              lines: [
                {
                  text: '"We squared away. You need something else?"',
                  expr: "normal",
                },
                {
                  text: '"I also buy watches, jewellery, dreams, regrets."',
                  expr: "smirk",
                },
                {
                  text: '"Actually not dreams. Market\'s tanked."',
                  expr: "normal",
                },
              ],
            });
            return;
          }
          // First time
          pawnTalked = true;
          saveState({ pawnTalked: true });
          DialogSystem.show({
            speaker: "TONY",
            speakerPortrait: "pawn",
            playerPortrait: "normal",
            lines: [
              {
                text: '"Hey. You look like someone who needs cash."',
                expr: "normal",
              },
              {
                text: '"Good news: you\'ve found a pawn shop."',
                expr: "smirk",
              },
              {
                text: '"Name\'s Tony. I buy and sell. Mostly buy."',
                expr: "normal",
              },
              { text: '"You got anything worth something?"', expr: "smirk" },
            ],
            choices: [
              sp.inventory.length > 0
                ? { label: "Sell an item (+€8)", value: "sell" }
                : { label: "Nothing to sell right now.", value: "nothing" },
              { label: "What do you buy?", value: "ask" },
            ],
            onChoice(val) {
              if (val === "sell" && sp.inventory.length > 0) {
                const sold = sp.inventory.shift();
                sp.money += 8;
                pawnSold = true;
                saveState({
                  money: sp.money,
                  inventory: sp.inventory,
                  pawnSold: true,
                });
                setTimeout(() => {
                  DialogSystem.show({
                    speaker: "TONY",
                    speakerPortrait: "pawn",
                    playerPortrait: "happy",
                    lines: [
                      {
                        text: `"${sold.name}. Sure, I\'ve seen worse."`,
                        expr: "smirk",
                      },
                      { text: '"€8. Don\'t push it."', expr: "normal" },
                      {
                        text: `★ Sold ${sold.name} for €8. Balance: €${sp.money}.`,
                        speaker: "left",
                        expr: "happy",
                      },
                    ],
                  });
                }, 80);
              } else if (val === "ask") {
                setTimeout(() => {
                  DialogSystem.show({
                    speaker: "TONY",
                    speakerPortrait: "pawn",
                    playerPortrait: "normal",
                    lines: [
                      {
                        text: '"Watches. Phones. Jewellery. Tools."',
                        expr: "normal",
                      },
                      {
                        text: "\"Weapons if you don't ask me where they're from.\"",
                        expr: "smirk",
                      },
                      {
                        text: '"And once — a pigeon. That was a weird Tuesday."',
                        expr: "normal",
                      },
                    ],
                  });
                }, 80);
              } else {
                setTimeout(() => {
                  DialogSystem.show({
                    speaker: "TONY",
                    speakerPortrait: "pawn",
                    playerPortrait: "normal",
                    lines: [
                      {
                        text: '"Come back when your pockets aren\'t so empty."',
                        expr: "smirk",
                      },
                    ],
                  });
                }, 80);
              }
            },
          });
        },
        draw(ctx) {
          const t = Date.now();
          const p = SCALE;
          ctx.save();
          ctx.translate(S / 2, S + Math.sin(t / 1200) * p * 0.5);
          // Shadow
          ctx.globalAlpha = 0.15;
          ctx.fillStyle = "#000";
          ctx.beginPath();
          ctx.ellipse(0, S * 0.42, S * 0.25, S * 0.06, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          // Legs
          ctx.fillStyle = "#2a2030";
          ctx.fillRect(-4 * p, 0, 3 * p, 9 * p);
          ctx.fillRect(p, 0, 3 * p, 9 * p);
          ctx.fillStyle = "#0e0e14";
          ctx.fillRect(-5 * p, 9 * p, 5 * p, 3 * p);
          ctx.fillRect(p, 9 * p, 5 * p, 3 * p);
          // Apron — stained
          ctx.fillStyle = "#c8b070";
          ctx.fillRect(-5 * p, -12 * p, 10 * p, 14 * p);
          ctx.fillStyle = "#a89050";
          ctx.fillRect(-5 * p, -12 * p, 3 * p, 8 * p);
          // Stains
          ctx.fillStyle = "rgba(80,40,20,0.5)";
          ctx.fillRect(-2 * p, -4 * p, 3 * p, 3 * p);
          ctx.fillRect(2 * p, 2 * p, 2 * p, 2 * p);
          // Shirt under
          ctx.fillStyle = "#3a2828";
          ctx.fillRect(-6 * p, -13 * p, 3 * p, 5 * p);
          ctx.fillRect(3 * p, -13 * p, 3 * p, 5 * p);
          // Arms — big, sleeves rolled
          ctx.fillStyle = "#3a2828";
          ctx.fillRect(-10 * p, -11 * p, 5 * p, 10 * p);
          ctx.fillRect(5 * p, -11 * p, 5 * p, 10 * p);
          ctx.fillStyle = "#c8a070";
          ctx.fillRect(-10 * p, -1 * p, 5 * p, 5 * p);
          ctx.fillRect(5 * p, -1 * p, 5 * p, 5 * p);
          // Tattoo on arm
          ctx.fillStyle = "rgba(40,60,200,0.6)";
          ctx.fillRect(-9 * p, -8 * p, 3 * p, 4 * p);
          ctx.fillStyle = "rgba(40,60,200,0.4)";
          ctx.fillRect(-9 * p, -5 * p, 2 * p, 2 * p);
          // Neck
          ctx.fillStyle = "#c8a070";
          ctx.fillRect(-3 * p, -15 * p, 6 * p, 3 * p);
          // Head — broad
          ctx.fillStyle = "#c8a070";
          ctx.fillRect(-7 * p, -27 * p, 14 * p, 12 * p);
          ctx.fillStyle = "rgba(255,200,120,0.15)";
          ctx.fillRect(-7 * p, -27 * p, 14 * p, 4 * p);
          // Bald head + side hair
          ctx.fillStyle = "#2a1a08";
          ctx.fillRect(-7 * p, -30 * p, 5 * p, 6 * p);
          ctx.fillRect(2 * p, -30 * p, 5 * p, 6 * p);
          ctx.fillStyle = "rgba(0,0,0,0.12)";
          ctx.fillRect(-7 * p, -27 * p, 14 * p, 3 * p); // shadow brow
          // Eyes — narrow
          ctx.fillStyle = "#1a0a04";
          ctx.fillRect(-5 * p, -21 * p, 4 * p, 3 * p);
          ctx.fillRect(p, -21 * p, 4 * p, 3 * p);
          ctx.fillStyle = "#6a4030";
          ctx.fillRect(-4 * p, -20 * p, 2 * p, 2 * p);
          ctx.fillRect(2 * p, -20 * p, 2 * p, 2 * p);
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.fillRect(-4 * p, -21 * p, p, p);
          ctx.fillRect(2 * p, -21 * p, p, p);
          // Eyebrows — thick
          ctx.fillStyle = "#1a0808";
          ctx.fillRect(-6 * p, -23 * p, 6 * p, 2 * p);
          ctx.fillRect(0, -23 * p, 6 * p, 2 * p);
          // Nose — large
          ctx.fillStyle = "#b89060";
          ctx.fillRect(-p, -18 * p, 3 * p, 3 * p);
          // Moustache
          ctx.fillStyle = "#1a0808";
          ctx.fillRect(-4 * p, -15 * p, 8 * p, 2 * p);
          // Mouth
          ctx.fillStyle = "#7a5030";
          ctx.fillRect(-3 * p, -13 * p, 6 * p, p);
          ctx.fillStyle = "rgba(255,255,255,0.3)";
          ctx.fillRect(-2 * p, -13 * p, p, p);
          ctx.fillRect(p, -13 * p, p, p);
          // Gold tooth glint
          const glint = 0.5 + 0.5 * Math.sin(t / 300);
          ctx.globalAlpha = glint;
          ctx.fillStyle = "#f0c020";
          ctx.fillRect(p, -13 * p, p, p);
          ctx.globalAlpha = 1;
          // Sign above
          ctx.globalAlpha = 0.7 + 0.3 * Math.sin(t / 600);
          ctx.fillStyle = "#f0c020";
          ctx.font = `${p * 3}px monospace`;
          ctx.textAlign = "center";
          ctx.fillText("PAWN", 0, -32 * p);
          ctx.globalAlpha = 1;
          ctx.restore();
        },
      });

      /* ─── BAR OWNER (inside north building row, accessible via door) ─── */
      SOBJECTS.push({
        id: "bartender",
        tx: 24,
        ty: 4,
        w: 1,
        h: 2,
        hx: 24,
        hy: 4,
        hw: 1,
        hh: 2,
        label: "Bartender — Vera",
        interact() {
          if (barDrunk) {
            DialogSystem.show({
              speaker: "VERA",
              speakerPortrait: "bartender",
              playerPortrait: "surprised",
              lines: [
                {
                  text: "\"You're back. How's the floor treating you?\"",
                  expr: "smirk",
                },
                {
                  text: '"Water\'s free. Dignity costs extra."',
                  expr: "normal",
                },
              ],
            });
            return;
          }
          if (barTalked) {
            DialogSystem.show({
              speaker: "VERA",
              speakerPortrait: "bartender",
              playerPortrait: "normal",
              lines: [
                { text: '"Still standing. Good sign."', expr: "normal" },
                {
                  text: '"You ordering something or just using the ambience?"',

        suiCanvas.height = H;
        suiCanvas.style.width = W + "px";
        suiCanvas.style.height = H + "px";
        updateCamera(W);
      }

      function updateCamera(viewW) {
        camX = sp.tx * S - viewW / 2;
        camX = Math.max(0, Math.min(COLS * S - viewW, camX));
      }

      let sLastTime = 0;
      function sGameLoop(ts) {
        const dt = Math.min((ts - sLastTime) / 1000, 0.05);
        sLastTime = ts;
        const isDialog = DialogSystem.isOpen();
        if (sGameState === "playing" && !isDialog) sUpdatePlayer(dt);
        if (tripActive) {
          tripTimer += dt;
          tripMsgTimer += dt;
          if (tripMsgTimer > 2.5) {
            tripMsgTimer = 0;
            tripMsgVisible = true;
            tripMsgIdx = Math.floor(Math.random() * TRIP_MESSAGES.length);
          }
          if (tripTimer >= TRIP_DURATION) {
            tripActive = false;
            tripTimer = 0;
            tripMsgVisible = false;
          }
        }
        updateRain(dt);
        sDrawWorld();
        sDrawUI();
        if (tripActive) drawTripEffect();
        requestAnimationFrame(sGameLoop);
      }

      function updateRain(dt) {
        for (const r of RAIN) {
          r.y += r.speed * dt * S * 0.06;
          r.x += r.speed * dt * S * 0.01; // slight wind
          if (r.y > ROWS * S) {
            r.y = -r.len;
            r.x = Math.random() * COLS * S;
          }
        }
      }

      const SSPEED = 5.5;
      function sUpdatePlayer(dt) {
        let dx = 0,
          dy = 0;
        if (skeys["w"] || skeys["arrowup"]) dy = -1;
        if (skeys["s"] || skeys["arrowdown"]) dy = 1;
        if (skeys["a"] || skeys["arrowleft"]) dx = -1;
        if (skeys["d"] || skeys["arrowright"]) dx = 1;
        if (dx && dy) {
          dx *= 0.707;
          dy *= 0.707;
        }
        if (dx || dy) {
          const nx = sp.tx + dx * SSPEED * dt,
            ny = sp.ty + dy * SSPEED * dt;
          if (!sSolid(nx, sp.ty)) sp.tx = nx;
          if (!sSolid(sp.tx, ny)) sp.ty = ny;
          if (Math.abs(dx) > Math.abs(dy))
            sp.facing = dx > 0 ? "right" : "left";
          else sp.facing = dy > 0 ? "down" : "up";
          sp.frameTimer = (sp.frameTimer || 0) + dt;
          if (sp.frameTimer > 0.12) {
            sp.frameTimer = 0;
            sp.frame = (sp.frame + 1) % 4;
          }
        } else sp.frame = 0;
        updateCamera(window.innerWidth);
        sCanvas.style.left = -Math.round(camX) + "px";
        sCanvas.style.top = (window.innerHeight - ROWS * S) / 2 + "px";

        // Exit west → back to Street2
        if (sp.tx <= 0.5 && !returnTriggered) {
          returnTriggered = true;
          sGameState = "exiting";
          saveState({
            money: sp.money,
            inventory: sp.inventory,
            weapon: sp.weapon,
            dignity: sp.dignity,
          });
          doFade(() => {
            window.location.href = "Street2.html?from=east";
          });
        }
        // Exit east → placeholder
        if (sp.tx >= COLS - 1 && !exitRight) {
          exitRight = true;
          DialogSystem.show({
            speaker: "NARRATOR",
            speakerPortrait: "unknown",
            playerPortrait: "normal",
            lines: [
              {
                text: "The street keeps going into the dark.",
                speaker: "right",
              },
              {
                text: '"You can feel something at the end of this block."',
                speaker: "left",
                expr: "surprised",
              },
              { text: "[More district coming soon]", speaker: "right" },
            ],
            onClose() {
              exitRight = false;
              sp.tx = COLS - 1.5;
            },
          });
        }
      }

      function doFade(cb) {
        const fade = document.createElement("div");
        fade.style.cssText =
          "position:fixed;inset:0;background:#050508;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;";
        document.body.appendChild(fade);
        requestAnimationFrame(() =>
          requestAnimationFrame(() => {
            fade.style.opacity = "1";
          })
        );
        setTimeout(cb, 900);
      }

      function sSolid(tx, ty) {
        const c = Math.floor(tx),
          r = Math.floor(ty);
        if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return true;
        const t = SMAP[r]?.[c];
        if (SOLID_STREET.has(t)) return true;
        for (const obj of SOBJECTS) {
          if (obj._skip) continue;
          if (!obj.hw || !obj.hh) continue;
          const pL = tx + 0.15,
            pR = tx + 0.85,
            pT = ty + 0.15,
            pB = ty + 0.85;
          if (
            pR > obj.hx &&
            pL < obj.hx + obj.hw &&
            pB > obj.hy &&
            pT < obj.hy + obj.hh
          )
            return true;
        }
        return false;
      }

      function sTryInteract() {
        if (DialogSystem.isOpen()) return;
        const off = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
        const [ox, oy] = off[sp.facing];
        const cx = Math.floor(sp.tx) + ox,
          cy = Math.floor(sp.ty) + oy;
        const px = Math.floor(sp.tx),
          py = Math.floor(sp.ty);
        for (const obj of SOBJECTS) {
          if (obj._skip) continue;
          const hit =
            (cx >= obj.tx &&
              cx < obj.tx + obj.w &&
              cy >= obj.ty &&
              cy < obj.ty + obj.h) ||
            (px >= obj.tx &&
              px < obj.tx + obj.w &&
              py >= obj.ty &&
              py < obj.ty + obj.h);
          if (hit) {
            obj.interact();
            return;
          }
        }
        if (SMAP[cy]?.[cx] === _D || SMAP[py]?.[px] === _D) {
          // Casino doors: cols 66-67 on row 3 (north side, under CASINO neon)
          const doorCol = SMAP[cy]?.[cx] === _D ? cx : px;
          const doorRow = SMAP[cy]?.[cx] === _D ? cy : py;
          const isCasinoDoor = doorRow <= 3 && doorCol >= 65 && doorCol <= 68;
          if (isCasinoDoor) {
            DialogSystem.show({
              speaker: "NARRATOR",
              speakerPortrait: "unknown",
              playerPortrait: "surprised",
              lines: [
                {
                  text: "LUCKY TUESDAY CASINO. The pink neon pulses above the door.",
                  speaker: "right",
                },
                {
                  text: '"The bouncer looks at you. You look at the bouncer."',
                  speaker: "right",
                },
                {
                  text: '"This is either the best or worst idea of the evening."',
                  speaker: "left",
                  expr: "surprised",
                },
                {
                  text: '"Probably both. It\'s Tuesday."',
                  speaker: "left",
                  expr: "normal",
                },
              ],
              onClose() {
                saveState({
                  money: sp.money,
                  inventory: sp.inventory,
                  dignity: sp.dignity,
                });
                doFade(() => {
                  window.location.href = "Casino.html";
                });
              },
            });
          } else {
            DialogSystem.show({
              speaker: "NARRATOR",
              speakerPortrait: "unknown",
              playerPortrait: "normal",
              lines: [
                {
                  text: "A door into someone else's building. Not tonight.",
                  speaker: "right",
                },
              ],
            });
          }
        }
      }

      /* ── DRAW ── */
      function sDrawWorld() {
        sCtx.fillStyle = "#050508";
        sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);

        // Night sky
        const skyH = 4 * S;
        const skyG = sCtx.createLinearGradient(0, 0, 0, skyH);
        skyG.addColorStop(0, C.skyTop);
        skyG.addColorStop(0.7, C.skyMid);
        skyG.addColorStop(1, C.skyBot);
        sCtx.fillStyle = skyG;
        sCtx.fillRect(0, 0, COLS * S, skyH);

        // Stars (fewer due to light pollution)
        for (const st of STARS) {
          const ta =
            0.2 + 0.3 * Math.abs(Math.sin(Date.now() / 1400 + st.twinkle));
          sCtx.globalAlpha = ta;
          sCtx.fillStyle = C.star;
          sCtx.beginPath();
          sCtx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
          sCtx.fill();
        }
        sCtx.globalAlpha = 1;

        // Tiles
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++) sDrawTile(c, r);

        // Neon signs
        drawNeonSigns();

        // Objects
        [...SOBJECTS]
          .filter((o) => !o._skip)
          .sort((a, b) => a.ty + a.h - (b.ty + b.h))
          .forEach((obj) => {
            sCtx.save();
            sCtx.translate(obj.tx * S, obj.ty * S);
            obj.draw(sCtx);
            sCtx.restore();
          });

        sDrawPlayer();
        sDrawHint();
        drawReturnArrow();
        drawRain();
      }

      function drawNeonSigns() {
        const t = Date.now();
        for (const ns of NEON_SIGNS) {
          const flicker =
            Math.sin(t / 200 + ns.x) * Math.sin(t / 137 + ns.x * 2);
          const alpha =
            (0.7 + 0.3 * Math.abs(flicker)) * (flicker > -0.95 ? 1 : 0.1); // occasional blink
          sCtx.save();
          sCtx.globalAlpha = alpha * 0.4;
          sCtx.fillStyle = ns.glow;
          sCtx.beginPath();
          sCtx.ellipse(
            ns.x + ns.w / 2,
            ns.y,
            ns.w * 0.6,
            S * 0.8,
            0,
            0,
            Math.PI * 2
          );
          sCtx.fill();
          sCtx.globalAlpha = alpha;
          sCtx.font = `bold ${SCALE * 3.5}px "Bebas Neue",sans-serif`;
          sCtx.fillStyle = ns.color;
          sCtx.textAlign = "left";
          sCtx.textBaseline = "top";
          // Multi-shadow for neon glow
          sCtx.shadowColor = ns.color;
          sCtx.shadowBlur = SCALE * 6;
          sCtx.fillText(ns.text, ns.x, ns.y);
          sCtx.shadowBlur = SCALE * 12;
          sCtx.globalAlpha = alpha * 0.3;
          sCtx.fillText(ns.text, ns.x, ns.y);
          sCtx.shadowBlur = 0;
          sCtx.globalAlpha = 1;
          sCtx.restore();
        }
      }

      function drawRain() {
        sCtx.save();
        for (const r of RAIN) {
          sCtx.globalAlpha = r.alpha;
          sCtx.strokeStyle = C.rainA;
          sCtx.lineWidth = 0.8;
          sCtx.beginPath();
          sCtx.moveTo(r.x, r.y);
          sCtx.lineTo(r.x + r.len * 0.15, r.y + r.len);
          sCtx.stroke();
        }
        sCtx.globalAlpha = 1;
        sCtx.restore();
      }

      function sDrawTile(c, r) {
        sCtx.save();
        sCtx.translate(c * S, r * S);
        const t = SMAP[r]?.[c];
        if (t === _B) drawBuilding(c, r);
        else if (t === _P) drawPavement(c, r);
        else if (t === _W) drawWetPavement(c, r);
        else if (t === _R) drawRoad(c, r);
        else if (t === _M) drawRoadMark();
        else if (t === _D) drawDoor(c, r);
        else if (t === _T) drawTree();
        else if (t === _L) {
          drawPavement(c, r);
          drawLamp(c, r);
        } else {
          sCtx.fillStyle = "#050508";
          sCtx.fillRect(0, 0, S, S);
        }
        sCtx.restore();
      }

      function drawBuilding(c, r) {
        const v = (c * 5 + r * 11) % 4;
        sCtx.fillStyle = [C.bldA, C.bldB, C.bldC, C.bldD][v];
        sCtx.fillRect(0, 0, S, S);
        // brick lines
        sCtx.strokeStyle = "rgba(0,0,0,0.25)";
        sCtx.lineWidth = 0.5;
        for (let y = 0; y < S; y += SCALE * 4) {
          sCtx.beginPath();
          sCtx.moveTo(0, y);
          sCtx.lineTo(S, y);
          sCtx.stroke();
        }
        // neon wash from signs
        sCtx.fillStyle = "rgba(255,40,80,0.04)";
        sCtx.fillRect(0, 0, S, S);
        // windows
        if (r <= 2 && (c + r) % 2 === 0) {
          const winType = (c * 7 + r) % 3;
          const on = (Math.floor(Date.now() / 5000) + c + r * 3) % 6 !== 0;
          if (winType === 0) {
            sCtx.fillStyle = on ? C.winNeonR : C.winOff;
          } else if (winType === 1) {
            sCtx.fillStyle = on ? C.winNeonB : C.winOff;
          } else {
            sCtx.fillStyle = on ? C.winOn : C.winOff;
          }
          sCtx.fillRect(SCALE * 3, SCALE * 3, S - SCALE * 6, S - SCALE * 6);
          if (on) {
            sCtx.fillStyle = "rgba(0,0,0,0.18)";
            sCtx.fillRect(SCALE * 3, SCALE * 3, S - SCALE * 6, SCALE * 2);
          }
        }
        sCtx.fillStyle = "rgba(0,0,0,0.25)";
        sCtx.fillRect(0, S - SCALE * 2, S, SCALE * 2);
      }

      function drawPavement(c, r) {
        const v = (c * 5 + r * 11) % 3;
        sCtx.fillStyle = [C.pavA, C.pavB, C.pavC][v];
        sCtx.fillRect(0, 0, S, S);
        sCtx.strokeStyle = C.pavLine;
        sCtx.lineWidth = 0.5;
        if (c % 2 === 0) {
          sCtx.beginPath();
          sCtx.moveTo(0, 0);
          sCtx.lineTo(0, S);
          sCtx.stroke();
        }
        if (r % 2 === 0) {
          sCtx.beginPath();
          sCtx.moveTo(0, 0);
          sCtx.lineTo(S, 0);
          sCtx.stroke();
        }
        // neon reflections on pavement
        const nr = NEON_SIGNS.find((ns) => Math.abs(ns.x / S - c) < 5);
        if (nr) {
          sCtx.globalAlpha = 0.06 + 0.04 * Math.sin(Date.now() / 800 + c);
          sCtx.fillStyle = nr.color;
          sCtx.fillRect(0, 0, S, S);
          sCtx.globalAlpha = 1;
        }
        sCtx.fillStyle = "rgba(0,0,0,0.1)";
        sCtx.fillRect(0, S - SCALE, S, SCALE);
      }

      function drawWetPavement(c, r) {
        drawPavement(c, r);
        // Puddle shimmer
        const t = Date.now() / 1000;
        sCtx.fillStyle = C.pavWet;
        sCtx.fillRect(SCALE, SCALE, S - SCALE * 2, S - SCALE * 2);
        sCtx.globalAlpha = 0.15 + 0.1 * Math.sin(t * 2 + c + r);
        sCtx.fillStyle = "rgba(100,140,200,0.4)";
        sCtx.fillRect(SCALE * 2, SCALE * 2, S - SCALE * 4, S - SCALE * 4);
        sCtx.globalAlpha = 1;
      }

      function drawRoad(c, r) {
        sCtx.fillStyle = (c + r) % 2 === 0 ? C.rdA : C.rdB;
        sCtx.fillRect(0, 0, S, S);
        // wet road reflections
        const nr = NEON_SIGNS.find((ns) => Math.abs(ns.x / S - c) < 8);
        if (nr) {
          sCtx.globalAlpha = 0.08;
          sCtx.fillStyle = nr.color;
          sCtx.fillRect(0, 0, S, S);
          sCtx.globalAlpha = 1;
        }
      }
      function drawRoadMark() {
        sCtx.fillStyle = C.rdA;
        sCtx.fillRect(0, 0, S, S);
        sCtx.fillStyle = C.rdMark;
        sCtx.fillRect(SCALE * 2, SCALE * 5, S - SCALE * 4, S - SCALE * 10);
      }
      function drawDoor(c, r) {
        drawBuilding(c, r);
        const gl = 0.06 + 0.04 * Math.sin(Date.now() / 1800);
        sCtx.fillStyle = "#1e1210";
        sCtx.fillRect(SCALE * 2, SCALE * 2, S - SCALE * 4, S - SCALE * 2);
        sCtx.fillStyle = "#0c0804";
        sCtx.fillRect(SCALE * 3, SCALE * 3, S - SCALE * 6, S - SCALE * 3);
        sCtx.fillStyle = `rgba(200,160,80,${gl})`;
        sCtx.fillRect(SCALE * 3, SCALE * 3, S - SCALE * 6, S - SCALE * 3);
      }
      function drawTree() {
        drawPavement(0, 0);
        sCtx.fillStyle = C.treeTk;
        sCtx.fillRect(S / 2 - SCALE * 2, S * 0.4, SCALE * 4, S * 0.6);
        sCtx.fillStyle = C.treeLvA;
        sCtx.fillRect(SCALE, 0, S - SCALE * 2, S * 0.5);
        sCtx.fillStyle = C.treeLvB;
        sCtx.fillRect(SCALE * 2, 0, S - SCALE * 4, S * 0.4);
        sCtx.fillStyle = C.treeLvC;
        sCtx.fillRect(SCALE * 3, 0, S - SCALE * 6, S * 0.25);
      }
      function drawLamp(c, r) {
        // Neon lamp post — red/pink glow
        sCtx.fillStyle = "#303030";
        sCtx.fillRect(S / 2 - SCALE, 0, SCALE * 2, S);
        sCtx.fillStyle = "#252525";
        sCtx.fillRect(S / 2 - SCALE, 0, SCALE, S);
        sCtx.fillStyle = "#202020";
        sCtx.fillRect(S / 2 - SCALE * 3, 0, SCALE * 6, SCALE * 4);
        // Neon tube
        sCtx.fillStyle = "rgba(255,40,80,0.85)";
        sCtx.fillRect(S / 2 - SCALE * 2, SCALE, SCALE * 4, SCALE * 2);
        const haloG = sCtx.createRadialGradient(
          S / 2,
          SCALE * 2,
          0,
          S / 2,
          SCALE * 2,
          S
        );
        haloG.addColorStop(0, "rgba(255,40,80,0.18)");
        haloG.addColorStop(1, "rgba(255,40,80,0)");
        sCtx.fillStyle = haloG;
        sCtx.fillRect(-S * 0.5, -S * 0.3, S * 2, S * 2);
      }

      /* ── Player ── */
      function sDrawPlayer() {
        const px = sp.tx * S + S / 2,
          py = sp.ty * S + S / 2;
        const bob = sp.frame === 1 || sp.frame === 3 ? -SCALE : 0;
        const loff = sp.frame === 1 ? 2 : sp.frame === 3 ? -2 : 0;
        const aoff = sp.frame === 1 ? -2 : sp.frame === 3 ? 2 : 0;
        const p = SCALE;
        sCtx.save();
        sCtx.translate(px, py + bob);
        sCtx.globalAlpha = 0.18;
        sCtx.fillStyle = "#000";
        sCtx.beginPath();
        sCtx.ellipse(0, S * 0.38, S * 0.24, S * 0.065, 0, 0, Math.PI * 2);
        sCtx.fill();
        sCtx.globalAlpha = 1;
        const fl = sp.facing === "left";
        if (fl) sCtx.scale(-1, 1);
        sCtx.fillStyle = "#252018";
        sCtx.fillRect(-5 * p, 4 * p, 4 * p, 8 * p + loff * p);
        sCtx.fillRect(p, 4 * p, 4 * p, 8 * p - loff * p);
        sCtx.fillStyle = "#101008";
        sCtx.fillRect(-7 * p, 12 * p + loff * p, 7 * p, 3 * p);
        sCtx.fillRect(p, 12 * p - loff * p, 7 * p, 3 * p);
        sCtx.fillStyle = "#506030";
        sCtx.fillRect(-9 * p, -5 * p + aoff * p, 4 * p, 10 * p);
        sCtx.fillRect(5 * p, -5 * p - aoff * p, 4 * p, 10 * p);
        sCtx.fillStyle = "#d0a880";
        sCtx.fillRect(-9 * p, 4 * p + aoff * p, 4 * p, 3 * p);
        sCtx.fillRect(5 * p, 4 * p - aoff * p, 4 * p, 3 * p);
        sCtx.fillStyle = "#506030";
        sCtx.fillRect(-6 * p, -8 * p, 12 * p, 13 * p);
        sCtx.fillStyle = "#3a4a1a";
        sCtx.fillRect(-6 * p, -8 * p, 3 * p, 6 * p);
        sCtx.fillRect(3 * p, -8 * p, 3 * p, 6 * p);
        sCtx.fillStyle = "#8a7050";
        sCtx.fillRect(-p, -2 * p, 3 * p, 4 * p);
        sCtx.fillStyle = "#1a1008";
        sCtx.fillRect(-6 * p, 3 * p, 12 * p, 2 * p);
        sCtx.fillStyle = "#c8a060";
        sCtx.fillRect(-p, 3 * p, 2 * p, 2 * p);
        sCtx.fillStyle = "#c8a070";
        sCtx.fillRect(-2 * p, -9 * p, 4 * p, 2 * p);
        sCtx.fillRect(-5 * p, -18 * p, 10 * p, 9 * p);
        sCtx.fillStyle = "#231a0a";
        sCtx.fillRect(-5 * p, -20 * p, 10 * p, 4 * p);
        sCtx.fillRect(-6 * p, -18 * p, 2 * p, 6 * p);
        sCtx.fillRect(4 * p, -18 * p, 3 * p, 5 * p);
        if (sp.facing !== "up") {
          sCtx.fillStyle = "#ecddc0";
          sCtx.fillRect(-4 * p, -16 * p, 3 * p, 3 * p);
          sCtx.fillRect(p, -16 * p, 3 * p, 3 * p);
          sCtx.fillStyle = "#1a0a04";
          sCtx.fillRect(-3 * p, -15 * p, 2 * p, 2 * p);
          sCtx.fillRect(p, -15 * p, 2 * p, 2 * p);
          sCtx.fillStyle = "rgba(255,255,255,0.85)";
          sCtx.fillRect(-3 * p, -16 * p, p, p);
          sCtx.fillRect(p, -16 * p, p, p);
          sCtx.fillStyle = "#b09070";
          sCtx.fillRect(-4 * p, -13 * p, 3 * p, p);
          sCtx.fillRect(p, -13 * p, 3 * p, p);
          sCtx.fillStyle = "#6a5038";
          sCtx.fillRect(-3 * p, -12 * p, 2 * p, p);
          sCtx.fillRect(0, -12 * p, 2 * p, p);
          sCtx.fillRect(-2 * p, -11 * p, 5 * p, p);
        } else {
          sCtx.fillStyle = "#231a0a";
          sCtx.fillRect(-3 * p, -15 * p, 6 * p, 2 * p);
        }
        // Neon tint on player
        const nearNeon = NEON_SIGNS.find(
          (ns) => Math.abs(ns.x - sp.tx * S) < 5 * S
        );
        if (nearNeon) {
          sCtx.globalAlpha = 0.08;
          sCtx.fillStyle = nearNeon.color;
          sCtx.fillRect(-12 * p, -22 * p, 24 * p, 40 * p);
          sCtx.globalAlpha = 1;
        }
        sCtx.restore();
      }

      function sDrawHint() {
        if (DialogSystem.isOpen() || sGameState !== "playing") return;
        const off = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
        const [ox, oy] = off[sp.facing];
        const cx = Math.floor(sp.tx) + ox,
          cy = Math.floor(sp.ty) + oy;
        let nearObj = null;
        for (const obj of SOBJECTS) {
          if (obj._skip) continue;
          if (
            cx >= obj.tx &&
            cx < obj.tx + obj.w &&
            cy >= obj.ty &&
            cy < obj.ty + obj.h
          ) {
            nearObj = obj;
            break;
          }
        }
        const nearDoor = SMAP[cy]?.[cx] === _D;
        if (!nearObj && !nearDoor) return;
        const isCasinoDoor = nearDoor && cy <= 3 && cx >= 65 && cx <= 68;
        const label = isCasinoDoor ? "🎰 CASINO" : nearDoor ? "ENTER ?" : "E";
        const tx2 = nearObj ? (nearObj.tx + nearObj.w / 2) * S : cx * S + S / 2;
        const ty2 = nearObj ? nearObj.ty * S - SCALE * 4 : cy * S - SCALE * 4;
        const bw = isCasinoDoor ? S * 4 : S * 2.2;
        const pulse = 0.82 + 0.18 * Math.sin(Date.now() / 250);
        sCtx.save();
        sCtx.globalAlpha = pulse;
        sCtx.fillStyle = "rgba(0,0,0,0.4)";
        rRect(
          sCtx,
          tx2 - bw / 2 + SCALE,
          ty2 - S * 0.35 + SCALE,
          bw,
          S * 0.56,
          SCALE * 2
        );
        sCtx.fill();
        sCtx.fillStyle = isCasinoDoor ? "#ff40c0" : C.hintBg;
        sCtx.strokeStyle = C.hintTx;
        sCtx.lineWidth = SCALE;
        rRect(sCtx, tx2 - bw / 2, ty2 - S * 0.35, bw, S * 0.56, SCALE * 2);
        sCtx.fill();
        sCtx.stroke();
        sCtx.fillStyle = isCasinoDoor ? "#fff" : C.hintTx;
        sCtx.font = `bold ${SCALE * (isCasinoDoor ? 3 : 4)}px monospace`;
        sCtx.textAlign = "center";
        sCtx.textBaseline = "middle";
        sCtx.fillText(label, tx2, ty2 - S * 0.08);
        sCtx.restore();
      }

      function drawReturnArrow() {
        const t = Date.now();
        sCtx.save();
        sCtx.globalAlpha = 0.5 + 0.4 * Math.sin(t / 500);
        sCtx.fillStyle = "#ffe600";
        sCtx.font = `bold ${SCALE * 4}px monospace`;

        sCtx.fillText("◄ BACK", SCALE * 4, 4.5 * S);
        sCtx.globalAlpha = 1;
        sCtx.restore();
      }

      function rRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
      }

      function drawTripEffect() {
        const t = Date.now() / 1000;
        const prog = tripTimer / TRIP_DURATION;
        const intensity =
          prog < 0.15 ? prog / 0.15 : prog > 0.8 ? (1 - prog) / 0.2 : 1;
        sCtx.save();
        const offX = Math.sin(t * 2.1) * SCALE * 4 * intensity,
          offY = Math.cos(t * 1.7) * SCALE * 2 * intensity;
        sCtx.globalCompositeOperation = "screen";
        sCtx.globalAlpha = 0.18 * intensity;
        sCtx.fillStyle = "#ff0040";
        sCtx.fillRect(offX, offY, sCanvas.width, sCanvas.height);
        sCtx.fillStyle = "#0040ff";
        sCtx.fillRect(-offX, -offY, sCanvas.width, sCanvas.height);
        sCtx.globalCompositeOperation = "source-over";
        sCtx.globalAlpha = 1;
        if (tripMsgVisible) {
          const msgA =
            Math.min(1, 1 - Math.abs(tripMsgTimer - 1.1) / 1.1) * intensity;
          sCtx.globalAlpha = msgA;
          sCtx.font = `bold ${SCALE * 5}px "Permanent Marker",cursive`;
          sCtx.textAlign = "center";
          sCtx.textBaseline = "middle";
          sCtx.fillStyle = "rgba(0,255,80,0.9)";
          sCtx.fillText(
            TRIP_MESSAGES[tripMsgIdx],
            sCanvas.width / 2,
            (sp.ty + 0.5) * S + Math.sin(t * 2) * SCALE * 8
          );
          sCtx.globalAlpha = 1;
        }
        sCtx.restore();
      }

          ctx.fillRect(-6 * p, -18 * p, 2 * p, p);
          ctx.fillRect(4 * p, -18 * p, 2 * p, p);
          ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.fillRect(-4 * p, -19 * p, 2 * p, p);
          ctx.restore();
          ctx.restore();
        };

        DialogSystem.PORTRAITS.shadow = function (ctx, expr) {
          const cx = 168 / 2,
            cy = 168 / 2 + 16,
            p = 3;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.fillStyle = "rgba(2,1,5,0.98)";
          ctx.fillRect(-84, -84, 168, 168);
          const t = Date.now();
          // Dark silhouette with purple edge
          const flicker = 0.6 + 0.4 * Math.sin(t / 250);
          ctx.globalAlpha = flicker;
          ctx.fillStyle = "#030208";
          ctx.fillRect(-10 * p, -38 * p, 20 * p, 52 * p);
          // Edge highlight
          ctx.fillStyle = "rgba(120,50,255,0.3)";
          ctx.fillRect(-10 * p, -38 * p, 2 * p, 52 * p);
          ctx.fillRect(8 * p, -38 * p, 2 * p, 52 * p);
          ctx.fillRect(-10 * p, -38 * p, 20 * p, 2 * p);
          // Eyes
          const eg = 0.7 + 0.3 * Math.sin(t / 350);
          ctx.globalAlpha = eg;
          ctx.fillStyle = "rgba(160,80,255,0.95)";
          ctx.fillRect(-3 * p, -24 * p, 2 * p, 2 * p);
          ctx.fillRect(p, -24 * p, 2 * p, 2 * p);
          // Smoke
          for (let i = 0; i < 6; i++) {
            const ox = Math.sin(t / 500 + i * 0.9) * 3 * p;
            const oy = (Math.cos(t / 400 + i * 1.2) * 2 - i * 2.5) * p;
            ctx.globalAlpha = 0.05 * Math.abs(Math.sin(t / 600 + i));
            ctx.fillStyle = "#6020a0";
            ctx.fillRect(-10 * p + ox, -38 * p + oy, 20 * p, 4 * p);
          }
          ctx.globalAlpha = 1;
          ctx.restore();
        };
      }
    </script>
